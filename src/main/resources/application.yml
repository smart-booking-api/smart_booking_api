spring:
  application:
    name: smart-booking-api

  data:
    redis:
      host: 127.0.0.1
      port: 6379

  datasource:
    driver-class-name: org.h2.Driver
    url: 'jdbc:h2:mem:test'
    username: sa
    password: password

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        show_sql: true
  jwt:
    secret: smartbookingsystem2024smartbookingsystem2024

springdoc:
  swagger-ui:
    path: /booking/swagger.html
    url: /booking/v3/api-docs
    enabled: true

  api-docs:
    path: /booking/v3/api-docs
    enabled: true

server:
  port: 8080


